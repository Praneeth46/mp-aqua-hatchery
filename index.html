<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:#FEFEFE;
color:#333;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:45px;
}

.logo h2{
font-size:20px;
color:#4A6A67;
margin:0;
}

nav{
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:#4A6A67;
font-weight:600;
}

/* HERO */

.hero{
height:420px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background-image:url("pl-tray.jpg");
background-size:cover;
background-position:center;
}

.hero-overlay{
background:rgba(255,255,255,0.85);
padding:25px;
border-radius:10px;
}

.hero h1{
color:#4A6A67;
font-size:36px;
margin:0;
}

.hero p{
font-size:18px;
}

/* SECTIONS */

.container{
max-width:1100px;
margin:auto;
padding:50px 20px;
}

.section-title{
text-align:center;
color:#4A6A67;
font-size:26px;
margin-bottom:30px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

/* CTA */

.cta{
background:#4A6A67;
color:white;
text-align:center;
padding:60px 20px;
}

.cta-btn{
display:inline-block;
margin-top:15px;
background:white;
color:#4A6A67;
padding:16px 30px;
border-radius:8px;
font-size:18px;
text-decoration:none;
font-weight:bold;
}

/* FOOTER */

footer{
background:#4A6A67;
color:white;
text-align:center;
padding:30px;
}

/* FLOATING BUTTONS */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 18px;
border-radius:50px;
font-size:18px;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.call{
position:fixed;
bottom:80px;
right:20px;
background:#4A6A67;
color:white;
padding:14px 18px;
border-radius:50px;
font-size:18px;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* MOBILE OPTIMIZATION */

@media (max-width:768px){

header{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

nav{
flex-wrap:wrap;
gap:12px;
}

.hero{
height:350px;
padding:20px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

.section-title{
font-size:22px;
}

.container{
padding:40px 15px;
}

.cta-btn{
width:100%;
max-width:250px;
}

}

</style>
